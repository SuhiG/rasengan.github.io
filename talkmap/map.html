<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Travel map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.0.0-beta.2/leaflet.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.0.0-beta.2/leaflet.js"></script>
  <link rel="stylesheet" href="leaflet_dist/MarkerCluster.css" />
  <link rel="stylesheet" href="leaflet_dist/MarkerCluster.Default.css" />
  <script src="leaflet_dist/leaflet.markercluster-src.js"></script>
  <script src="org-locations.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
      min-height: 360px;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    var tiles = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    });

    var map = L.map("map", { layers: [tiles] });
    var markers = L.markerClusterGroup({
      showCoverageOnHover: false,
      maxClusterRadius: 60
    });
    var bounds = [];

    for (var i = 0; i < addressPoints.length; i++) {
      var a = addressPoints[i];
      var marker = L.marker(new L.LatLng(a[1], a[2]), { title: a[0] });
      marker.bindPopup(a[0]);
      markers.addLayer(marker);
      bounds.push([a[1], a[2]]);
    }

    map.addLayer(markers);

    if (bounds.length > 0) {
      map.fitBounds(bounds, { padding: [24, 24] });
    } else {
      map.setView([20, 0], 2);
    }
  </script>
</body>
</html>
