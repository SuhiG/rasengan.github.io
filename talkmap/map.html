<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Travel map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.0.0-beta.2/leaflet.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.0.0-beta.2/leaflet.js"></script>
  <link rel="stylesheet" href="leaflet_dist/MarkerCluster.css" />
  <link rel="stylesheet" href="leaflet_dist/MarkerCluster.Default.css" />
  <script src="leaflet_dist/leaflet.markercluster-src.js"></script>
  <script src="org-locations.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
      min-height: 360px;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    var tiles = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    });

    var map = L.map("map", { layers: [tiles] });
    var markers = L.markerClusterGroup({
      showCoverageOnHover: false,
      maxClusterRadius: 60
    });
    var bounds = [];
    var markerShadow = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.0.0-beta.2/images/marker-shadow.png";
    var transitIcon = L.icon({
      iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
      shadowUrl: markerShadow,
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    });

    for (var i = 0; i < addressPoints.length; i++) {
      var point = addressPoints[i];
      var isLegacyArray = Array.isArray(point);
      var label = isLegacyArray ? point[0] : point.label;
      var lat = isLegacyArray ? point[1] : point.lat;
      var lng = isLegacyArray ? point[2] : point.lng;
      var markerOptions = { title: label };

      if (!isLegacyArray && point.type === "transit") {
        markerOptions.icon = transitIcon;
      }

      var marker = L.marker(new L.LatLng(lat, lng), markerOptions);
      marker.bindPopup(label);
      markers.addLayer(marker);
      bounds.push([lat, lng]);
    }

    map.addLayer(markers);

    if (bounds.length > 0) {
      map.fitBounds(bounds, { padding: [24, 24] });
    } else {
      map.setView([20, 0], 2);
    }
  </script>
</body>
</html>
