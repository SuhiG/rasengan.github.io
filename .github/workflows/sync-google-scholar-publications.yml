name: Sync Google Scholar Publications

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  sync-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch publications from Google Scholar
        run: |
          python scripts/fetch_scholar_publications.py \
            --profile-url "https://scholar.google.com/citations?user=AoeGGVQAAAAJ&hl=en" \
            --output "_data/google_scholar_publications.yml" \
            --stats-output "_data/google_scholar_stats.yml" \
            --strict

      - name: Commit and push updates
        run: |
          if git diff --quiet; then
            echo "No publication changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/google_scholar_publications.yml _data/google_scholar_stats.yml
          git commit -m "chore: sync publications from Google Scholar"
          git push
